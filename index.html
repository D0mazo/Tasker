<!DOCTYPE html>
<html>
<head>
  <title>Task Planner</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topbar">

  <h1>Task Planner</h1>

  <button onclick="logout()">Logout</button>

</div>


<div class="container">

  <div class="task-form">

    <h2>Add Task</h2>

    <form id="taskForm">

      <input type="text" id="name" placeholder="Task name" required>

      <input type="date" id="deadline" required>

      <input type="number" id="hours" placeholder="Total hours" required>

      <input type="number" id="done" placeholder="Hours done" value="0">

      <button>Add Task</button>

    </form>

  </div>


  <div class="task-list">

    <h2>Your Tasks</h2>

    <table>

      <thead>
      <tr>
        <th>Task</th>
        <th>Deadline</th>
        <th>Total</th>
        <th>Done</th>
        <th>Progress</th>
        <th>Left</th>
      </tr>
      </thead>

      <tbody id="taskTable"></tbody>

    </table>

  </div>

</div>


<script>

  function logout(){
    fetch("auth.php?action=logout").then(()=>window.location="login.html")
  }


  document.getElementById("taskForm").addEventListener("submit", function(e){

    e.preventDefault()

    fetch("backend.php",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        action:"add",
        name:name.value,
        deadline:deadline.value,
        hours:hours.value,
        done:done.value
      })
    })
            .then(res=>res.json())
            .then(()=>loadTasks())

  })


  function loadTasks(){

    fetch("backend.php?action=list")
            .then(res=>res.json())
            .then(tasks=>{

              let html=""

              tasks.forEach(t=>{

                html+=`
<tr>
<td>${t.name}</td>
<td>${t.deadline}</td>
<td>${t.hours}</td>
<td>${t.done}</td>
<td>
<div class="progress">
<div class="progress-bar" style="width:${t.progress}%">${t.progress}%</div>
</div>
</td>
<td>${t.left}</td>
</tr>
`

              })

              taskTable.innerHTML=html

            })

  }

  loadTasks()

</script>

</body>
</html>
